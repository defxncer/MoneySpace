<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="container">
            <article class="title">
                <img src="assets/images/logo.png" class="logo" alt="лого">
                <h1>Moneyspace</h1>
            </article>
        </div>
    </header>

   <main class="container">
    <section class="dashboard-grid">
        <div class="card balance-card">
            <p>Загальний баланс</p>
            <h2>45,200 ₴</h2>
        </div>

        <div class="card income-card">
            <p>Доходи</p>
            <h2 class="income">+ 12,000 ₴</h2>
        </div>

        <div class="card expense-card">
            <p>Витрати</p>
            <h2 class="expense">- 5,400 ₴</h2>
        </div>
        <button class="btn btn-income">Додати дохід</button>
        <button class="btn btn-expense">Додати витрату</button>
        <div class="modal-overlay" id="modalOverlay">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="modalTitle">Додати операцію</h3>
                    <button class="close-modal" id="closeModal">&times;</button>
                </div>
                <form class="modal-form">
                    <div class="form-group">
                        <label for="amount">Сума (₴)</label>
                        <input type="number" id="amount" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Категорія</label>
                        <input type="text" id="category" placeholder="Наприклад, Продукти або Зарплата" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Дата</label>
                        <input type="date" id="date" required>
                    </div>
                    <button type="submit" class="btn btn-block" id="modalSubmitBtn">Зберегти</button>
                </form>
            </div>
        </div>
    </section>

    <section class="transactions">
        <h3>Останні транзакції</h3>
    </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Moneyspace. Дипломний проєкт.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
