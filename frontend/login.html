<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Moneyspace — Вхід</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7fe;
            color: #1b2559;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-logo {
            text-align: center;
            width: 200px;
            margin: 15px;
        }

        .login-logo h1 {
            font-size: 36px;
            color: #284ae6;
            font-weight: 700;
        }

        .login-card {
            background: #ffffff;
            padding: 36px;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
            text-align: center;
        }

        .login-card h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #1b2559;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #a3aed0;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #e0e5f2;
            background-color: #f4f7fe;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            color: #1b2559;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: #284ae6;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            border: none;
            background-color: #284ae6;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn-login:hover {
            background-color: #1e3bb3;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(40, 74, 230, 0.25);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: #fff0ef;
            color: #ee5d50;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
        }

        .error-msg.visible {
            display: block;
        }

        footer {
            text-align: center;
            margin-top: 24px;
            color: #a3aed0;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">

    <div class="login-card">
        <img src="assets/images/ChatGPT Image2.png" alt="Логотип" class="login-logo">

        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
            <label for="username">Логін</label>
            <input type="text" id="username" placeholder="Введіть логін" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <input type="password" id="password" placeholder="Введіть пароль" autocomplete="current-password">
        </div>

        <button class="btn-login" id="loginBtn">Увійти</button>
    </div>

    <footer>&copy; 2026 Moneyspace. Дипломний проєкт.</footer>
</div>

<script>
    // Якщо вже є токен — одразу на головну
    if (localStorage.getItem('token')) {
        window.location.href = 'index.html';
    }

    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');

    function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
    }

    async function handleLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        errorMsg.classList.remove('visible');

        if (!username || !password) {
            showError('Введіть логін і пароль');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.textContent = 'Вхід...';

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (!res.ok) {
                showError(data.message || 'Помилка входу');
                return;
            }

            // Зберегти токен і ім'я користувача
            localStorage.setItem('token', data.token);
            localStorage.setItem('username', data.username);

            // Перейти на головну сторінку
            window.location.href = 'index.html';

        } catch (err) {
            showError('Не вдалося підключитись до сервера');
        } finally {
            loginBtn.disabled = false;
            loginBtn.textContent = 'Увійти';
        }
    }

    loginBtn.addEventListener('click', handleLogin);

    // Вхід по натисканню Enter
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleLogin();
    });
</script>

</body>
</html>
